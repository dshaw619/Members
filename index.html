<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Distribution Maps</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
body {
margin: 0;
padding: 20px;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
}
.container {
max-width: 1400px;
margin: 0 auto;
background: white;
border-radius: 15px;
box-shadow: 0 20px 40px rgba(0,0,0,0.1);
overflow: hidden;
}
.header {
background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
color: white;
padding: 25px;
text-align: center;
}
.header h1 {
margin: 0;
font-size: 2.5em;
font-weight: 300;
text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}
.header p {
margin: 10px 0 0 0;
opacity: 0.9;
font-size: 1.1em;
}
.nav-buttons {
display: flex;
gap: 10px;
justify-content: center;
flex-wrap: wrap;
padding: 15px;
background: #f8f9fa;
border-bottom: 1px solid #eee;
}
.nav-button {
background: linear-gradient(135deg, #3498db, #2980b9);
color: white;
border: none;
padding: 10px 20px;
margin: 5px;
border-radius: 25px;
cursor: pointer;
font-size: 14px;
font-weight: 600;
transition: all 0.3s ease;
box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
}
.nav-button:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
}
.nav-button.active {
background: linear-gradient(135deg, #e74c3c, #c0392b);
}
#map {
height: 600px;
width: 100%;
}
.legend {
background: white;
padding: 20px;
border-top: 1px solid #eee;
}
.legend h3 {
margin: 0 0 15px 0;
color: #2c3e50;
font-size: 1.3em;
}
.legend-item {
display: flex;
align-items: center;
margin: 8px 0;
font-size: 1.1em;
}
.legend-color {
width: 25px;
height: 20px;
margin-right: 12px;
border-radius: 4px;
border: 2px solid #333;
}
/* US Map Colors */
.high-members { background: #c0392b; }
.medium-high-members { background: #e74c3c; }
.medium-members { background: #f39c12; }
.low-members { background: #f1c40f; }
.very-low-members { background: #2ecc71; }
.no-members { background: #ecf0f1; }

/* California County Colors */
.very-high-members { background: #8b0000; }
.ca-high-members { background: #dc143c; }
.ca-medium-members { background: #ff6347; }
.ca-low-members { background: #ffa500; }
.ca-very-low-members { background: #32cd32; }

.stats {
background: #f8f9fa;
padding: 20px;
border-top: 1px solid #eee;
text-align: center;
}
.stats h3 {
margin: 0 0 10px 0;
color: #2c3e50;
}
.member-count {
font-size: 2em;
font-weight: bold;
color: #3498db;
margin: 0;
}
.status-message {
background: #e8f4fd;
border: 1px solid #3498db;
border-radius: 8px;
padding: 15px;
margin: 20px;
text-align: center;
color: #2c3e50;
}
.custom-tooltip {
background: rgba(44, 62, 80, 0.95) !important;
color: white !important;
border: none !important;
border-radius: 6px !important;
padding: 8px 12px !important;
font-size: 14px !important;
font-weight: 500 !important;
box-shadow: 0 3px 12px rgba(0,0,0,0.3) !important;
text-shadow: none !important;
}
.popup-button {
background: #3498db;
color: white;
border: none;
padding: 8px 15px;
border-radius: 5px;
cursor: pointer;
margin-top: 10px;
font-size: 13px;
}
.popup-button:hover {
background: #2980b9;
}
.county-list, .city-list {
background: white;
padding: 20px;
border-top: 1px solid #eee;
}
.county-grid, .city-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 10px;
margin-top: 15px;
}
.county-item, .city-item {
background: #f8f9fa;
padding: 10px;
border-radius: 6px;
border-left: 4px solid #3498db;
cursor: pointer;
transition: all 0.2s;
}
.county-item:hover, .city-item:hover {
background: #e8f4fd;
transform: translateY(-1px);
}
.county-name, .city-name {
font-weight: bold;
color: #2c3e50;
font-size: 14px;
}
.county-members, .city-members {
color: #3498db;
font-size: 12px;
}
@media (max-width: 768px) {
.header h1 { font-size: 2em; }
.nav-buttons { flex-direction: column; align-items: center; }
.county-grid, .city-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1 id="mapTitle">Member Distribution by State</h1>
<p id="mapSubtitle">413 members across 32 states</p>
</div>
<div class="nav-buttons">
<button class="nav-button active" onclick="showUSMap()">🇺🇸 US States</button>
<button class="nav-button" onclick="showCaliforniaMap()">🏔️ CA Counties</button>
<button class="nav-button" onclick="showSanDiegoMap()">🏖️ SD Cities</button>
</div>
<div id="map"></div>
<div class="legend" id="legendContainer">
<!-- Legend content will be populated by JavaScript -->
</div>
<div class="stats" id="statsContainer">
<!-- Stats content will be populated by JavaScript -->
</div>
<div class="county-list" id="countyListContainer" style="display: none;">
<!-- County list will be populated by JavaScript -->
</div>
<div class="city-list" id="cityListContainer" style="display: none;">
<!-- City list will be populated by JavaScript -->
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// Global variables
let map;
let currentMapType = 'us';
let stateLayer;

// Data
const membersByState = {
'California': 257, 'Washington': 15, 'Oregon': 12, 'Texas': 9, 'Arizona': 7,
'Florida': 6, 'Colorado': 5, 'North Carolina': 5, 'New Jersey': 4, 'New York': 4,
'Ohio': 3, 'Maryland': 3, 'Massachusetts': 3, 'Illinois': 3, 'Pennsylvania': 2,
'Virginia': 2, 'Utah': 2, 'Tennessee': 2, 'Nebraska': 2, 'Maine': 2, 'Arkansas': 2,
'South Carolina': 1, 'Nevada': 1, 'Montana': 1, 'Minnesota': 1, 'Kentucky': 1,
'Indiana': 1, 'Idaho': 1, 'Hawaii': 1, 'Georgia': 1, 'Delaware': 1, 'Alaska': 1
};

const membersByCounty = {
'San Diego': { count: 201, coords: [32.7157, -117.1611] },
'Orange': { count: 4, coords: [33.7175, -117.8311] },
'Los Angeles': { count: 4, coords: [34.0522, -118.2437] },
'Santa Clara': { count: 4, coords: [37.3541, -121.9552] },
'Riverside': { count: 5, coords: [33.7208, -116.2154] },
'Sacramento': { count: 5, coords: [38.7816, -121.4944] },
'Santa Barbara': { count: 3, coords: [34.4208, -119.6982] },
'Sonoma': { count: 2, coords: [38.5816, -122.8678] },
'San Luis Obispo': { count: 1, coords: [35.3050, -120.6625] },
'Ventura': { count: 2, coords: [34.3705, -119.2290] },
'Alameda': { count: 1, coords: [37.6017, -121.7195] },
'Contra Costa': { count: 2, coords: [37.9161, -121.9744] },
'Marin': { count: 1, coords: [38.0834, -122.7633] },
'Monterey': { count: 1, coords: [36.6002, -121.8947] },
'Napa': { count: 1, coords: [38.5025, -122.2654] },
'Nevada': { count: 1, coords: [39.2658, -121.0146] },
'Placer': { count: 2, coords: [39.0916, -120.8039] },
'San Joaquin': { count: 1, coords: [37.9577, -121.2908] },
'San Mateo': { count: 1, coords: [37.5630, -122.3255] },
'Shasta': { count: 1, coords: [40.7608, -122.2736] },
'Tulare': { count: 1, coords: [36.2077, -119.3473] },
'Fresno': { count: 1, coords: [36.8859, -119.2321] },
'Imperial': { count: 2, coords: [32.8312, -115.5631] },
'Inyo': { count: 1, coords: [36.8053, -118.0623] }
};

const membersByCity = {
'San Diego': { count: 118, coords: [32.7157, -117.1611] },
'El Cajon': { count: 17, coords: [32.7948, -116.9625] },
'Encinitas': { count: 9, coords: [33.0370, -117.2920] },
'Lakeside': { count: 9, coords: [32.8494, -116.9056] },
'Carlsbad': { count: 8, coords: [33.1581, -117.3506] },
'La Jolla': { count: 8, coords: [32.8328, -117.2713] },
'Spring Valley': { count: 8, coords: [32.7448, -116.9989] },
'Coronado': { count: 7, coords: [32.6859, -117.1831] },
'Poway': { count: 6, coords: [32.9628, -117.0359] },
'La Mesa': { count: 6, coords: [32.7678, -117.0231] },
'Bonita': { count: 5, coords: [32.6581, -117.0253] },
'Lemon Grove': { count: 5, coords: [32.7426, -117.0314] },
'Jamul': { count: 5, coords: [32.7284, -116.8753] },
'Chula Vista': { count: 4, coords: [32.6401, -117.0842] },
'Santee': { count: 4, coords: [32.8384, -116.9739] },
'Oceanside': { count: 3, coords: [33.1959, -117.3795] },
'Ramona': { count: 3, coords: [33.0420, -116.8681] },
'Escondido': { count: 3, coords: [33.1192, -117.0864] },
'Del Mar': { count: 2, coords: [32.9595, -117.2653] },
'Fallbrook': { count: 2, coords: [33.3767, -117.2511] },
'National City': { count: 2, coords: [32.6781, -117.0992] },
'Julian': { count: 1, coords: [33.0789, -116.6025] },
'Cardiff By The Sea': { count: 1, coords: [33.0142, -117.2806] },
'Solana Beach': { count: 1, coords: [32.9911, -117.2714] },
'Vista': { count: 1, coords: [33.2000, -117.2425] },
'Valley Center': { count: 1, coords: [33.2297, -117.0281] }
};

// Initialize map
function initializeMap() {
if (map) {
map.remove();
}
map = L.map('map').setView([39.8283, -98.5795], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap contributors',
maxZoom: 15,
minZoom: 3
}).addTo(map);
}

// Color functions
function getUSColor(memberCount) {
if (memberCount >= 100) return '#c0392b';
if (memberCount >= 10) return '#e74c3c';
if (memberCount >= 5) return '#f39c12';
if (memberCount >= 2) return '#f1c40f';
if (memberCount >= 1) return '#2ecc71';
return '#ecf0f1';
}

function getCAColor(memberCount) {
if (memberCount >= 150) return '#8b0000';
if (memberCount >= 10) return '#dc143c';
if (memberCount >= 5) return '#ff6347';
if (memberCount >= 2) return '#ffa500';
if (memberCount >= 1) return '#32cd32';
return '#ecf0f1';
}

function getSDColor(memberCount) {
if (memberCount >= 50) return '#8b0000';
if (memberCount >= 10) return '#dc143c';
if (memberCount >= 5) return '#ff6347';
if (memberCount >= 2) return '#ffa500';
if (memberCount >= 1) return '#32cd32';
return '#ecf0f1';
}

// US Map Functions
function showUSMap() {
currentMapType = 'us';
updateActiveButton(0);
document.getElementById('mapTitle').textContent = 'Member Distribution by State';
document.getElementById('mapSubtitle').textContent = 'Hover over states to see member counts - Click for detailed information';
document.getElementById('countyListContainer').style.display = 'none';
document.getElementById('cityListContainer').style.display = 'none';

initializeMap();
loadUSStates();
updateUSLegend();
updateUSStats();
}

function loadUSStates() {
const statusDiv = createStatusMessage('Loading US state boundaries...');
fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
.then(response => response.json())
.then(data => {
statusDiv.innerHTML = 'Processing state boundaries...';

function onEachFeature(feature, layer) {
const stateName = feature.properties.name;
const memberCount = membersByState[stateName] || 0;

layer.bindTooltip(`${stateName}<br><strong>${memberCount} members</strong>`, {
permanent: false,
direction: 'top',
offset: [0, -10],
className: 'custom-tooltip'
});
        
layer.on({
mouseover: function(e) {
e.target.setStyle({ weight: 3, fillOpacity: 0.9 });
},
mouseout: function(e) {
stateLayer.resetStyle(e.target);
},
click: function(e) {
const percentage = memberCount > 0 ? ((memberCount / 413) * 100).toFixed(1) : '0.0';
let popupContent = `
<div style="font-size: 14px; line-height: 1.4;">
<div style="font-weight: bold; color: #2c3e50; margin-bottom: 5px;">${stateName}</div>
<div style="color: #3498db; font-weight: 500; font-size: 16px;">${memberCount} members</div>
<div style="color: #7f8c8d; margin-top: 5px;">${percentage}% of total membership</div>`;
            
if (stateName === 'California') {
popupContent += `<button onclick="showCaliforniaMap()" class="popup-button">View County Details →</button>`;
}
popupContent += `</div>`;
layer.bindPopup(popupContent).openPopup();
}
});
}

stateLayer = L.geoJSON(data, {
style: function(feature) {
const stateName = feature.properties.name;
const memberCount = membersByState[stateName] || 0;
return {
fillColor: getUSColor(memberCount),
weight: 2,
opacity: 1,
color: '#2c3e50',
dashArray: '',
fillOpacity: 0.7
};
},
onEachFeature: onEachFeature
}).addTo(map);

map.fitBounds(stateLayer.getBounds());
statusDiv.innerHTML = 'US membership map loaded successfully!';
setTimeout(() => statusDiv.remove(), 2000);
})
.catch(error => {
console.log('State boundary loading failed:', error);
statusDiv.innerHTML = 'Could not load state boundaries. Please refresh the page.';
});
}

function updateUSLegend() {
document.getElementById('legendContainer').innerHTML = `
<h3>Members per State</h3>
<div class="legend-item">
<div class="legend-color high-members"></div>
<span>100+ members (California: 257)</span>
</div>
<div class="legend-item">
<div class="legend-color medium-high-members"></div>
<span>10-99 members (Washington, Oregon, Texas)</span>
</div>
<div class="legend-item">
<div class="legend-color medium-members"></div>
<span>5-9 members (Arizona, Colorado, etc.)</span>
</div>
<div class="legend-item">
<div class="legend-color low-members"></div>
<span>2-4 members</span>
</div>
<div class="legend-item">
<div class="legend-color very-low-members"></div>
<span>1 member</span>
</div>
<div class="legend-item">
<div class="legend-color no-members"></div>
<span>No members</span>
</div>
`;
}

function updateUSStats() {
document.getElementById('statsContainer').innerHTML = `
<h3>Total US Members</h3>
<p class="member-count">413</p>
<p>Across 32 states</p>
`;
}

// California Map Functions
function showCaliforniaMap() {
currentMapType = 'california';
updateActiveButton(1);
document.getElementById('mapTitle').textContent = 'California Members by County';
document.getElementById('mapSubtitle').textContent = '257 members across California counties';
document.getElementById('countyListContainer').style.display = 'block';
document.getElementById('cityListContainer').style.display = 'none';

initializeMap();
map.setView([36.7783, -119.4179], 6);
loadCaliforniaCounties();
updateCaliforniaLegend();
updateCaliforniaStats();
populateCountyList();
}

function loadCaliforniaCounties() {
// Clear any existing layers
map.eachLayer(function(layer) {
if (layer instanceof L.CircleMarker) {
map.removeLayer(layer);
}
});

Object.entries(membersByCounty).forEach(([countyName, data]) => {
const marker = L.circleMarker(data.coords, {
radius: Math.min(Math.max(data.count * 0.3, 8), 30),
fillColor: getCAColor(data.count),
color: '#2c3e50',
weight: 2,
opacity: 1,
fillOpacity: 0.8
}).addTo(map);

marker.bindTooltip(`${countyName} County<br><strong>${data.count} members</strong>`, {
permanent: false,
direction: 'top',
offset: [0, -10],
className: 'custom-tooltip'
});

marker.on('click', function() {
const percentage = ((data.count / 257) * 100).toFixed(1);
let popupContent = `
<div style="font-size: 14px; line-height: 1.4;">
<div style="font-weight: bold; color: #2c3e50; margin-bottom: 5px;">${countyName} County</div>
<div style="color: #3498db; font-weight: 500; font-size: 16px;">${data.count} members</div>
<div style="color: #7f8c8d; margin-top: 5px;">${percentage}% of California total</div>`;
        
if (countyName === 'San Diego') {
popupContent += `<button onclick="showSanDiegoMap()" class="popup-button">View City Details →</button>`;
}
popupContent += `</div>`;
marker.bindPopup(popupContent).openPopup();
});
});
}

function populateCountyList() {
const countyGrid = document.createElement('div');
countyGrid.className = 'county-grid';
countyGrid.id = 'countyGrid';

Object.entries(membersByCounty)
.sort((a, b) => b[1].count - a[1].count)
.forEach(([countyName, data]) => {
const countyItem = document.createElement('div');
countyItem.className = 'county-item';
countyItem.innerHTML = `
<div class="county-name">${countyName} County</div>
<div class="county-members">${data.count} members</div>
`;
countyItem.onclick = () => {
map.setView(data.coords, countyName === 'San Diego' ? 9 : 8);
};
countyGrid.appendChild(countyItem);
});

document.getElementById('countyListContainer').innerHTML = `
<h3>Counties with Members (Click to zoom)</h3>
`;
document.getElementById('countyListContainer').appendChild(countyGrid);
}

function updateCaliforniaLegend() {
document.getElementById('legendContainer').innerHTML = `
<h3>Members per County</h3>
<div class="legend-item">
<div class="legend-color very-high-members"></div>
<span>150+ members (San Diego County: 201)</span>
</div>
<div class="legend-item">
<div class="legend-color ca-high-members"></div>
<span>10-49 members</span>
</div>
<div class="legend-item">
<div class="legend-color ca-medium-members"></div>
<span>5-9 members</span>
</div>
<div class="legend-item">
<div class="legend-color ca-low-members"></div>
<span>2-4 members</span>
</div>
<div class="legend-item">
<div class="legend-color ca-very-low-members"></div>
<span>1 member</span>
</div>
<div class="legend-item">
<div class="legend-color no-members"></div>
<span>No members</span>
</div>
`;
}

function updateCaliforniaStats() {
document.getElementById('statsContainer').innerHTML = `
<h3>Total California Members</h3>
<p class="member-count">257</p>
<p>San Diego County: 78.2% of state total</p>
`;
}

// San Diego Map Functions
function showSanDiegoMap() {
currentMapType = 'sandiego';
updateActiveButton(2);
document.getElementById('mapTitle').textContent = 'San Diego County Members by City';
document.getElementById('mapSubtitle').textContent = '201 members across 26 San Diego County cities';
document.getElementById('countyListContainer').style.display = 'none';
document.getElementById('cityListContainer').style.display = 'block';

initializeMap();
map.setView([32.7157, -117.1611], 10);
loadSanDiegoCities();
updateSanDiegoLegend();
updateSanDiegoStats();
populateCityList();
}

function loadSanDiegoCities() {
// Clear any existing layers
map.eachLayer(function(layer) {
if (layer instanceof L.CircleMarker) {
map.removeLayer(layer);
}
});

Object.entries(membersByCity).forEach(([cityName, data]) => {
const markerSize = Math.min(Math.max(8 + (data.count * 0.8), 8), 35);
const marker = L.circleMarker(data.coords, {
radius: markerSize,
fillColor: getSDColor(data.count),
color: '#2c3e50',
weight: 3,
opacity: 1,
fillOpacity: 0.8
}).addTo(map);

marker.bindTooltip(`
<div style="text-align: center; font-weight: 600;">
<div style="font-size: 16px; margin-bottom: 4px;">${cityName}</div>
<div style="font-size: 14px; color: #3498db;">${data.count} member${data.count !== 1 ? 's' : ''}</div>
</div>`, {
permanent: false,
direction: 'top',
offset: [0, -10],
className: 'custom-tooltip'
});

marker.on('click', function() {
const percentage = ((data.count / 201) * 100).toFixed(1);
const rank = Object.entries(membersByCity)
.sort(([,a], [,b]) => b.count - a.count)
.findIndex(([name]) => name === cityName) + 1;
            
marker.bindPopup(`
<div style="text-align: center; padding: 5px; min-width: 200px;">
<div style="font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 8px;">
${cityName}
</div>
<div style="font-size: 24px; font-weight: 700; color: #3498db; margin-bottom: 8px;">
${data.count} member${data.count !== 1 ? 's' : ''}
</div>
<div style="color: #7f8c8d; margin-bottom: 5px;">
<strong>${percentage}%</strong> of county total
</div>
<div style="color: #27ae60; font-weight: 600;">
Rank: #${rank} of 26 cities
</div>
</div>
`, {
maxWidth: 250
}).openPopup();
});
});
}

function populateCityList() {
const cityGrid = document.createElement('div');
cityGrid.className = 'city-grid';

const sortedCities = Object.entries(membersByCity)
.sort(([,a], [,b]) => b.count - a.count);

sortedCities.forEach(([cityName, data], index) => {
const cityItem = document.createElement('div');
cityItem.className = 'city-item';
const percentage = ((data.count / 201) * 100).toFixed(1);
cityItem.innerHTML = `
<div class="city-name">${index + 1}. ${cityName}</div>
<div class="city-members">${data.count} members (${percentage}%)</div>
`;
cityItem.onclick = () => {
map.setView(data.coords, 12);
};
cityGrid.appendChild(cityItem);
});

document.getElementById('cityListContainer').innerHTML = `
<h3>All Cities with Members (Ranked by Member Count)</h3>
`;
document.getElementById('cityListContainer').appendChild(cityGrid);
}

function updateSanDiegoLegend() {
document.getElementById('legendContainer').innerHTML = `
<h3>Members per City</h3>
<div class="legend-item">
<div class="legend-color very-high-members"></div>
<span><strong>50+ members</strong> (San Diego: 118)</span>
</div>
<div class="legend-item">
<div class="legend-color ca-high-members"></div>
<span><strong>10-49 members</strong> (El Cajon: 17)</span>
</div>
<div class="legend-item">
<div class="legend-color ca-medium-members"></div>
<span><strong>5-9 members</strong> (6 cities)</span>
</div>
<div class="legend-item">
<div class="legend-color ca-low-members"></div>

// Utility functions
function updateActiveButton(activeIndex) {
const buttons = document.querySelectorAll('.nav-button');
buttons.forEach((button, index) => {
if (index === activeIndex) {
button.classList.add('active');
} else {
button.classList.remove('active');
}
});
}

function createStatusMessage(message) {
const statusDiv = document.createElement('div');
statusDiv.className = 'status-message';
statusDiv.innerHTML = message;
document.querySelector('.container').insertBefore(statusDiv, document.querySelector('.legend'));
return statusDiv;
}

// Initialize the map on page load
document.addEventListener('DOMContentLoaded', function() {
showUSMap();
});

// Ensure map renders properly after any changes
window.addEventListener('resize', () => {
if (map) {
setTimeout(() => map.invalidateSize(), 100);
}
});

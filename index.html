// ── STATE ─────────────────────────────────────────────────────────────────────

let map;
let currentMapType = 'us';
let stateLayer;

function initializeMap() {
  if (map) { map.remove(); }
  map = L.map('map').setView([39.8283, -98.5795], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19, minZoom: 3
  }).addTo(map);
}

// ── COLOR FUNCTIONS ───────────────────────────────────────────────────────────

function getUSColor(n) {
  if (n >= 100) return '#c0392b';
  if (n >= 10)  return '#e74c3c';
  if (n >= 5)   return '#f39c12';
  if (n >= 2)   return '#f1c40f';
  if (n >= 1)   return '#2ecc71';
  return '#ecf0f1';
}

function getCAColor(n) {
  if (n >= 150) return '#8b0000';
  if (n >= 10)  return '#dc143c';
  if (n >= 5)   return '#ff6347';
  if (n >= 2)   return '#ffa500';
  if (n >= 1)   return '#32cd32';
  return '#ecf0f1';
}

function getSDColor(n) {
  if (n >= 50) return '#8b0000';
  if (n >= 10) return '#dc143c';
  if (n >= 5)  return '#ff6347';
  if (n >= 2)  return '#ffa500';
  if (n >= 1)  return '#32cd32';
  return '#ecf0f1';
}

function getZIPColor(n) {
  if (n >= 10) return '#8b0000';
  if (n >= 7)  return '#dc143c';
  if (n >= 4)  return '#ff6347';
  if (n >= 2)  return '#ffa500';
  if (n >= 1)  return '#32cd32';
  return '#ecf0f1';
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

function updateActiveButton(idx) {
  document.querySelectorAll('.nav-button').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
}

function createStatusMessage(msg) {
  const d = document.createElement('div');
  d.className = 'status-message';
  d.innerHTML = msg;
  document.querySelector('.container').insertBefore(d, document.getElementById('legendContainer'));
  return d;
}

function clearCircleMarkers() {
  map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });
}

// ── US MAP ────────────────────────────────────────────────────────────────────

function showUSMap() {
  currentMapType = 'us';
  updateActiveButton(0);
  document.getElementById('mapTitle').textContent = 'Member Distribution by State';
  document.getElementById('mapSubtitle').textContent =
    `${usTotalMembers} US members across ${usTotalStates} states + DC — hover to inspect, click California to drill down`;
  initializeMap();
  loadUSStates();
  updateUSLegend();
  updateUSStats();
}

function loadUSStates() {
  const statusDiv = createStatusMessage('Loading US state boundaries…');
  fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
    .then(r => r.json())
    .then(data => {
      statusDiv.innerHTML = 'Processing state boundaries…';

      function onEachFeature(feature, layer) {
        const name = feature.properties.name;
        const count = membersByState[name] || 0;
        const pct = count > 0 ? ((count / usTotalMembers) * 100).toFixed(1) : '0.0';

        layer.bindTooltip(`${name}<br><strong>${count} member${count !== 1 ? 's' : ''}</strong>`, {
          permanent: false, direction: 'top', offset: [0, -10], className: 'custom-tooltip'
        });

        layer.on({
          mouseover: e => e.target.setStyle({ weight: 3, fillOpacity: 0.9 }),
          mouseout:  e => stateLayer.resetStyle(e.target),
          click: e => {
            let html = `
              <div style="font-size:14px;line-height:1.5;">
                <div style="font-weight:bold;color:#2c3e50;margin-bottom:5px;">${name}</div>
                <div style="color:#3498db;font-weight:500;font-size:16px;">${count} member${count !== 1 ? 's' : ''}</div>
                <div style="color:#7f8c8d;margin-top:5px;">${pct}% of US total</div>`;
            if (name === 'California') {
              html += `<button onclick="showCaliforniaMap()" class="popup-button">View County Details →</button>`;
            }
            html += `</div>`;
            layer.bindPopup(html).openPopup();
          }
        });
      }

      stateLayer = L.geoJSON(data, {
        style: feature => ({
          fillColor: getUSColor(membersByState[feature.properties.name] || 0),
          weight: 2, opacity: 1, color: '#2c3e50', fillOpacity: 0.7
        }),
        onEachFeature
      }).addTo(map);

      map.fitBounds(stateLayer.getBounds());
      statusDiv.innerHTML = 'US membership map loaded.';
      setTimeout(() => statusDiv.remove(), 2000);
    })
    .catch(() => {
      statusDiv.innerHTML = 'Could not load state boundaries. Please refresh.';
    });
}

  map.setView([36.78, -119.42], 6);
  loadCaliforniaCounties();
  updateCALegend();
  updateCAStats();
}

function loadCaliforniaCounties() {
  clearCircleMarkers();
  Object.entries(membersByCounty).forEach(([name, data]) => {
    const r = Math.min(Math.max(data.count * 0.3, 8), 35);
    const marker = L.circleMarker(data.coords, {
      radius: r,
      fillColor: getCAColor(data.count),
      color: '#2c3e50', weight: 2, opacity: 1, fillOpacity: 0.8
    }).addTo(map);

    marker.bindTooltip(
      `${name} County<br><strong>${data.count} member${data.count !== 1 ? 's' : ''}</strong>`,
      { permanent: false, direction: 'top', offset: [0, -10], className: 'custom-tooltip' }
    );

    marker.on('click', () => {
      const pct = ((data.count / caTotalMembers) * 100).toFixed(1);
      let html = `
        <div style="font-size:14px;line-height:1.5;min-width:180px;">
          <div style="font-weight:bold;color:#2c3e50;margin-bottom:5px;">${name} County</div>
          <div style="color:#3498db;font-weight:500;font-size:16px;">${data.count} member${data.count !== 1 ? 's' : ''}</div>
          <div style="color:#7f8c8d;margin-top:5px;">${pct}% of California total</div>`;
      if (name === 'San Diego') {
        html += `<button onclick="showSanDiegoMap()" class="popup-button">View City Details →</button>`;
      }
      html += `</div>`;
      marker.bindPopup(html).openPopup();
    });
  });
}

  document.getElementById('statsContainer').innerHTML = `
    <h3>Total California Members</h3>
    <p class="member-count">${caTotalMembers}</p>
    <p>San Diego County: ${sdPct}% of state total</p>`;
}

// ── SAN DIEGO COUNTY MAP ──────────────────────────────────────────────────────

function showSanDiegoMap() {
  currentMapType = 'sandiego';
  updateActiveButton(2);
  document.getElementById('mapTitle').textContent = 'San Diego County Members by City';
  document.getElementById('mapSubtitle').textContent =
    `${sdCountyTotalMembers} members across ${sdCountyCities} cities — click San Diego city to see ZIP code detail`;
  initializeMap();
  map.setView([32.82, -117.00], 10);
  loadSanDiegoCities();
  updateSDLegend();
  updateSDStats();
}

function loadSanDiegoCities() {
  clearCircleMarkers();
  const sortedCities = Object.entries(membersByCity).sort(([,a],[,b]) => b.count - a.count);
  const cityCount = sortedCities.length;

  Object.entries(membersByCity).forEach(([name, data]) => {
    const r = Math.min(Math.max(8 + data.count * 0.8, 8), 38);
    const marker = L.circleMarker(data.coords, {
      radius: r,
      fillColor: getSDColor(data.count),
      color: '#2c3e50', weight: 2, opacity: 1, fillOpacity: 0.8
    }).addTo(map);

    marker.bindTooltip(`
      <div style="text-align:center;font-weight:600;">
        <div style="font-size:16px;margin-bottom:4px;">${name}</div>
        <div style="font-size:14px;color:#3498db;">${data.count} member${data.count !== 1 ? 's' : ''}</div>
      </div>`, {
      permanent: false, direction: 'top', offset: [0, -10], className: 'custom-tooltip'
    });

    marker.on('click', () => {
      const pct = ((data.count / sdCountyTotalMembers) * 100).toFixed(1);
      const rank = sortedCities.findIndex(([n]) => n === name) + 1;
      let html = `
        <div style="text-align:center;padding:5px;min-width:200px;">
          <div style="font-size:18px;font-weight:bold;color:#2c3e50;margin-bottom:8px;">${name}</div>
          <div style="font-size:24px;font-weight:700;color:#3498db;margin-bottom:8px;">${data.count} member${data.count !== 1 ? 's' : ''}</div>
          <div style="color:#7f8c8d;margin-bottom:5px;"><strong>${pct}%</strong> of county total</div>
          <div style="color:#27ae60;font-weight:600;">Rank: #${rank} of ${cityCount} cities</div>`;
      if (name === 'San Diego') {
        html += `<button onclick="showZipMap()" class="popup-button">View ZIP Code Details →</button>`;
      }
      html += `</div>`;
      marker.bindPopup(html, { maxWidth: 260 }).openPopup();
    });
  });
}

function updateSDLegend() {
  document.getElementById('legendContainer').innerHTML = `
    <h3>Members per City</h3>
    <div class="legend-item"><div class="legend-color very-high-members"></div><span><strong>50+ members</strong> (San Diego: 118)</span></div>
    <div class="legend-item"><div class="legend-color ca-high-members"></div><span><strong>10–49 members</strong> (El Cajon: 15, Lakeside: 10)</span></div>
    <div class="legend-item"><div class="legend-color ca-medium-members"></div><span><strong>5–9 members</strong> (7 cities)</span></div>
    <div class="legend-item"><div class="legend-color ca-low-members"></div><span><strong>2–4 members</strong> (9 cities)</span></div>
    <div class="legend-item"><div class="legend-color ca-very-low-members"></div><span><strong>1 member</strong> (7 cities)</span></div>`;
}

function updateSDStats() {
  const sdPct = ((membersByCity['San Diego'].count / sdCountyTotalMembers) * 100).toFixed(1);
  document.getElementById('statsContainer').innerHTML = `
    <h3>Total San Diego County Members</h3>
    <p class="member-count">${sdCountyTotalMembers}</p>
    <p><strong>San Diego city:</strong> ${sdPct}% of county total</p>`;
}

// ── SAN DIEGO CITY ZIP MAP ────────────────────────────────────────────────────

function showZipMap() {
  currentMapType = 'zip';
  updateActiveButton(3);
  document.getElementById('mapTitle').textContent = 'San Diego City Members by ZIP Code';
  document.getElementById('mapSubtitle').textContent =
    `${sdCityTotalMembers} members across ${sdCityZips} ZIP codes — hover to inspect`;
  initializeMap();
  map.setView([32.820, -117.140], 11);
  loadZipMarkers();
  updateZIPLegend();
  updateZIPStats();
}

function loadZipMarkers() {
  clearCircleMarkers();
  const sortedZips = Object.entries(membersByZip).sort(([,a],[,b]) => b.count - a.count);
  const zipCount = sortedZips.length;

  Object.entries(membersByZip).forEach(([zip, data]) => {
    const r = Math.min(Math.max(10 + data.count * 1.2, 10), 38);
    const marker = L.circleMarker(data.coords, {
      radius: r,
      fillColor: getZIPColor(data.count),
      color: '#2c3e50', weight: 2, opacity: 1, fillOpacity: 0.8
    }).addTo(map);

    marker.bindTooltip(`
      <div style="text-align:center;font-weight:600;">
        <div style="font-size:16px;margin-bottom:2px;">${zip}</div>
        <div style="font-size:12px;opacity:0.85;margin-bottom:4px;">${data.nbhd}</div>
        <div style="font-size:14px;color:#3498db;">${data.count} member${data.count !== 1 ? 's' : ''}</div>
      </div>`, {
      permanent: false, direction: 'top', offset: [0, -10], className: 'custom-tooltip'
    });

    marker.on('click', () => {
      const pct = ((data.count / sdCityTotalMembers) * 100).toFixed(1);
      const rank = sortedZips.findIndex(([z]) => z === zip) + 1;
      marker.bindPopup(`
        <div style="text-align:center;padding:5px;min-width:210px;">
          <div style="font-size:20px;font-weight:bold;color:#2c3e50;margin-bottom:4px;">ZIP ${zip}</div>
          <div style="font-size:13px;color:#7f8c8d;margin-bottom:8px;">${data.nbhd}</div>
          <div style="font-size:24px;font-weight:700;color:#3498db;margin-bottom:8px;">${data.count} member${data.count !== 1 ? 's' : ''}</div>
          <div style="color:#7f8c8d;margin-bottom:5px;"><strong>${pct}%</strong> of San Diego city total</div>
          <div style="color:#27ae60;font-weight:600;">Rank: #${rank} of ${zipCount} ZIP codes</div>
        </div>`, { maxWidth: 260 }).openPopup();
    });
  });
}

function updateZIPLegend() {
  document.getElementById('legendContainer').innerHTML = `
    <h3>Members per ZIP Code</h3>
    <div class="legend-item"><div class="legend-color very-high-members"></div><span><strong>10+ members</strong> (92117: 13)</span></div>
    <div class="legend-item"><div class="legend-color ca-high-members"></div><span><strong>7–9 members</strong> (92120: 8, etc.)</span></div>
    <div class="legend-item"><div class="legend-color ca-medium-members"></div><span><strong>4–6 members</strong></span></div>
    <div class="legend-item"><div class="legend-color ca-low-members"></div><span><strong>2–3 members</strong></span></div>
    <div class="legend-item"><div class="legend-color ca-very-low-members"></div><span><strong>1 member</strong></span></div>`;
}

function updateZIPStats() {
  const top5 = Object.values(membersByZip).map(d=>d.count).sort((a,b)=>b-a).slice(0,5);
  const top5total = top5.reduce((s,v)=>s+v,0);
  const top5pct = ((top5total / sdCityTotalMembers) * 100).toFixed(1);
  document.getElementById('statsContainer').innerHTML = `
    <h3>Total San Diego City Members</h3>
    <p class="member-count">${sdCityTotalMembers}</p>
    <p>Across ${sdCityZips} ZIP codes &nbsp;|&nbsp; Top 5 ZIPs: ${top5pct}% of city total</p>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => showUSMap());
window.addEventListener('resize', () => { if (map) setTimeout(() => map.invalidateSize(), 100); });

</script>
</body>
</html>
